# ─────────────────────────────────────────────────────────────────────────────
# docker-compose.backend.yml — Backend only.
#
# Use when:
#   - Running the frontend separately (e.g. on Vercel / local Next.js dev)
#   - Deploying backend to its own VM or container host
#
# Usage:
#   cp .env.example .env
#   docker compose -f docker-compose.backend.yml up --build -d
# ─────────────────────────────────────────────────────────────────────────────

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    image: agent-puter/backend:latest
    container_name: agent_puter_backend
    restart: unless-stopped
    env_file: .env
    environment:
      HOST: "0.0.0.0"
      PORT: "9999"
    ports:
      - "9999:9999"
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:9999/.well-known/agent-card.json')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
