# ─────────────────────────────────────────────────────────────────────────────
# docker-compose.yml — Full stack (backend + frontend) on a single machine.
#
# Usage:
#   cp .env.example .env          # fill in your secrets
#   docker compose up --build -d
#
# Services:
#   backend  — Python swarm server (port 9999)
#   frontend — Next.js client      (port 3000)
# ─────────────────────────────────────────────────────────────────────────────

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    image: agent-puter/backend:latest
    container_name: agent_puter_backend
    restart: unless-stopped
    env_file: .env
    environment:
      HOST: "0.0.0.0"
      PORT: "9999"
    ports:
      - "9999:9999"
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:9999/.well-known/agent-card.json')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    networks:
      - agent_net

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        # The browser makes API calls through Next.js rewrites — so this is
        # the *internal* Docker network address of the backend, not localhost.
        NEXT_PUBLIC_API_URL: "http://backend:9999"
        NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: "${NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY:-}"
    image: agent-puter/frontend:latest
    container_name: agent_puter_frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: "http://backend:9999"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - agent_net

networks:
  agent_net:
    driver: bridge
